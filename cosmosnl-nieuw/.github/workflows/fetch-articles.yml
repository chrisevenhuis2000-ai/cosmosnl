name: 🤖 Auto-Fetch Articles

on:
  schedule:
    # Run every day at 07:00 UTC (09:00 NL time)
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch new articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run fetch-articles

      - name: Commit new articles
        run: |
          git config --local user.email "bot@cosmosnl.nl"
          git config --local user.name "CosmosNL Bot"
          git add content/articles/
          git diff --staged --quiet || git commit -m "🤖 Auto-fetch: $(date '+%Y-%m-%d') nieuwe artikelen"
          git push
        continue-on-error: true

      - name: Trigger Vercel/Cloudflare deployment
        # Uncomment and add your deploy hook URL as a secret
        # run: curl -X POST "${{ secrets.DEPLOY_HOOK_URL }}"
        run: echo "✅ Articles fetched and committed"
