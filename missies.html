<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NightGazer · Ruimtemissies — 3D Zonnestelsels</title>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --night: #1A1A2E; --orbit: #185FA5; --stellar: #378ADD;
    --cyan: #3dcfdf; --green: #3ddf90; --purple: #c080ff;
    --orange: #ffa040; --red: #ff6050;
    --text: #FFFFFF; --muted: #8A9BC4; --dim: #4A5A8A;
    --border: #252858; --surface: #12132A;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    --font-display: 'Georgia', serif;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #04050f; }
  canvas { display: block; }

  /* ── Top bar ── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 56px; background: rgba(26,26,46,0.88);
    backdrop-filter: blur(16px); border-bottom: 1px solid #252858;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; gap: 16px;
  }
  #topbar .logo { display: flex; align-items: center; gap: 12px; }
  #topbar .logo img { height: 36px; width: auto; }
  #topbar .title { font-family: var(--font-display); font-size: 1rem; color: #fff; font-weight: 700; }
  #topbar .subtitle { font-family: var(--font-mono); font-size: 0.55rem; color: var(--dim); letter-spacing: 0.15em; text-transform: uppercase; }
  #topbar .stats { display: flex; gap: 24px; }
  #topbar .stat { text-align: center; }
  #topbar .stat-val { font-family: var(--font-mono); font-size: 1.1rem; font-weight: 700; color: var(--stellar); }
  #topbar .stat-lbl { font-family: var(--font-mono); font-size: 0.45rem; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; }
  #topbar .controls { display: flex; gap: 8px; }
  .ctrl-btn {
    font-family: var(--font-mono); font-size: 0.52rem; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 6px 14px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; border-radius: 2px;
    transition: all 0.15s;
  }
  .ctrl-btn:hover, .ctrl-btn.active { background: rgba(55,138,221,0.15); border-color: var(--stellar); color: #fff; }

  /* ── Left panel – mission list ── */
  #missions-panel {
    position: fixed; top: 56px; left: 0; bottom: 0; z-index: 90;
    width: 280px; background: rgba(18,19,42,0.92); backdrop-filter: blur(16px);
    border-right: 1px solid var(--border); overflow-y: auto; scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    transition: transform 0.3s ease;
  }
  #missions-panel.hidden { transform: translateX(-280px); }
  .panel-header {
    padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
    font-family: var(--font-mono); font-size: 0.52rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--dim); display: flex; justify-content: space-between;
    align-items: center;
  }
  .mission-item {
    display: flex; align-items: flex-start; gap: 12; padding: 14px 20px;
    border-bottom: 1px solid rgba(37,40,88,0.5); cursor: pointer;
    transition: background 0.15s; gap: 12px;
  }
  .mission-item:hover, .mission-item.selected { background: rgba(55,138,221,0.08); }
  .mission-item.selected { border-left: 2px solid var(--stellar); }
  .mission-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .mission-dot.actief { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  .mission-dot.gepland { background: var(--stellar); }
  .mission-dot.voltooid { background: var(--dim); }
  .mission-name { font-family: var(--font-display); font-size: 0.82rem; color: #fff; font-weight: 700; line-height: 1.3; }
  .mission-sub { font-family: var(--font-mono); font-size: 0.5rem; color: var(--dim); margin-top: 3px; letter-spacing: 0.08em; }
  .mission-agency { font-family: var(--font-mono); font-size: 0.48rem; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }
  .status-badge {
    font-family: var(--font-mono); font-size: 0.42rem; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 2px 7px; border-radius: 2px; flex-shrink: 0;
    margin-top: 3px;
  }
  .status-badge.actief   { background: rgba(61,223,144,0.12); color: var(--green); border: 1px solid rgba(61,223,144,0.3); }
  .status-badge.gepland  { background: rgba(55,138,221,0.12); color: var(--stellar); border: 1px solid rgba(55,138,221,0.3); }
  .status-badge.voltooid { background: rgba(74,90,138,0.12); color: var(--dim); border: 1px solid rgba(74,90,138,0.3); }

  /* ── Detail panel ── */
  #detail-panel {
    position: fixed; top: 56px; right: 0; bottom: 0; z-index: 90;
    width: 320px; background: rgba(18,19,42,0.95); backdrop-filter: blur(20px);
    border-left: 1px solid var(--border); transform: translateX(320px);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #detail-panel.open { transform: translateX(0); }
  .detail-close {
    position: absolute; top: 16px; right: 16px; width: 28px; height: 28px;
    background: none; border: 1px solid var(--border); color: var(--muted);
    cursor: pointer; font-size: 1rem; border-radius: 2px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .detail-close:hover { border-color: var(--stellar); color: #fff; }
  .detail-hero {
    height: 140px; background: linear-gradient(135deg, #060c1a, #0a1428);
    display: flex; align-items: center; justify-content: center; font-size: 3.5rem;
    border-bottom: 1px solid var(--border); position: relative; overflow: hidden;
  }
  .detail-hero-glow {
    position: absolute; width: 160px; height: 160px; border-radius: 50%;
    background: radial-gradient(circle, rgba(55,138,221,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .detail-body { padding: 20px 20px 40px; }
  .detail-agency { font-family: var(--font-mono); font-size: 0.5rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
  .detail-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; color: #fff; line-height: 1.25; margin-bottom: 12px; }
  .detail-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.7; margin-bottom: 20px; }
  .detail-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .detail-meta-item { background: rgba(37,40,88,0.4); padding: 10px 12px; }
  .detail-meta-lbl { font-family: var(--font-mono); font-size: 0.44rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); margin-bottom: 4px; }
  .detail-meta-val { font-family: var(--font-mono); font-size: 0.62rem; color: #fff; }
  .detail-highlight { background: rgba(55,138,221,0.07); border-left: 2px solid rgba(55,138,221,0.4); padding: 10px 14px; margin-bottom: 20px; }
  .detail-highlight-text { font-family: var(--font-mono); font-size: 0.58rem; color: var(--muted); line-height: 1.6; }
  .detail-section-lbl { font-family: var(--font-mono); font-size: 0.48rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; }
  .detail-facts { display: flex; flex-direction: column; gap: 6px; }
  .detail-fact { display: flex; align-items: flex-start; gap: 8px; font-size: 0.73rem; color: var(--muted); line-height: 1.5; }
  .detail-fact::before { content: '▸'; color: var(--stellar); flex-shrink: 0; font-size: 0.6rem; margin-top: 2px; }

  /* ── 3D labels ── */
  .label3d {
    position: absolute; pointer-events: none; transform: translate(-50%, -100%);
    font-family: var(--font-mono); font-size: 0.52rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: #fff; white-space: nowrap;
    text-shadow: 0 0 8px rgba(0,0,0,0.9), 0 0 16px rgba(0,0,0,0.7);
    opacity: 0; transition: opacity 0.3s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .label3d .lname { font-size: 0.54rem; font-weight: 700; }
  .label3d .lagency { font-size: 0.44rem; opacity: 0.7; }
  .label3d .lline { width: 1px; height: 16px; background: rgba(255,255,255,0.3); }

  /* ── Help tooltip ── */
  #help {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 80; font-family: var(--font-mono); font-size: 0.5rem; letter-spacing: 0.1em;
    color: var(--dim); display: flex; gap: 20px; align-items: center;
    background: rgba(18,19,42,0.7); padding: 8px 20px; border: 1px solid var(--border);
    backdrop-filter: blur(8px); transition: opacity 0.5s;
  }
  #help span { display: flex; gap: 6px; align-items: center; }
  #help kbd { background: rgba(37,40,88,0.8); border: 1px solid var(--border); padding: 2px 6px; border-radius: 2px; font-family: var(--font-mono); font-size: 0.48rem; color: #fff; }

  /* ── Speed control ── */
  #speed-wrap {
    position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%);
    z-index: 80; display: flex; align-items: center; gap: 12px;
    background: rgba(18,19,42,0.75); padding: 8px 20px; border: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }
  #speed-wrap label { font-family: var(--font-mono); font-size: 0.5rem; color: var(--dim); letter-spacing: 0.1em; }
  #speed-slider { width: 100px; accent-color: var(--stellar); }
  #speed-val { font-family: var(--font-mono); font-size: 0.52rem; color: var(--stellar); width: 36px; }

  /* ── Animations ── */
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 4px #3ddf90; opacity: 1; }
    50% { box-shadow: 0 0 12px #3ddf90; opacity: 0.7; }
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: none; } }
  .fade-in { animation: fadeIn 0.4s ease both; }

  /* ── Focus ring ── */
  :focus-visible { outline: 2px solid var(--stellar); outline-offset: 2px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- Top bar -->
<header id="topbar">
  <div class="logo">
    <img src="/logo-transparent.png" alt="NightGazer" onerror="this.style.display='none'" />
    <div>
      <div class="title">Ruimtemissies</div>
      <div class="subtitle">Interactief 3D zonnestelsel</div>
    </div>
  </div>
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-val" id="stat-active">5</div><div class="stat-lbl">Actief</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--cyan)" id="stat-planned">2</div><div class="stat-lbl">Gepland</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--purple)" id="stat-total">8</div><div class="stat-lbl">Totaal</div></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn active" id="btn-panel" onclick="togglePanel()">☰ Missies</button>
    <button class="ctrl-btn" id="btn-orbits" onclick="toggleOrbits()">Banen</button>
    <button class="ctrl-btn" id="btn-labels" onclick="toggleLabels()">Labels</button>
    <button class="ctrl-btn" id="btn-reset" onclick="resetCamera()">⌖ Reset</button>
  </div>
</header>

<!-- Left – mission list -->
<aside id="missions-panel">
  <div class="panel-header">
    <span>Missies</span>
    <span id="mission-count" style="color:var(--stellar)">8</span>
  </div>
  <div id="mission-list"></div>
</aside>

<!-- Right – detail panel -->
<aside id="detail-panel" role="complementary" aria-label="Missie detail">
  <button class="detail-close" onclick="closeDetail()" aria-label="Sluiten">✕</button>
  <div id="detail-content"></div>
</aside>

<!-- Label overlay -->
<div id="labels-overlay" style="position:fixed;inset:0;pointer-events:none;z-index:50;"></div>

<!-- Speed control -->
<div id="speed-wrap">
  <label for="speed-slider">Snelheid</label>
  <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1" oninput="setSpeed(this.value)" />
  <span id="speed-val">1×</span>
</div>

<!-- Help -->
<div id="help">
  <span><kbd>Klik</kbd> missie selecteren</span>
  <span><kbd>Scroll</kbd> zoom</span>
  <span><kbd>Slepen</kbd> roteren</span>
  <span><kbd>Rechts</kbd> pannen</span>
</div>

<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

// ── Mission data ───────────────────────────────────────────────────────────
const MISSIONS = [
  {

    icon: '🌌', launched: '5 sep 1977', body: 'Interstellair',
    orbitRadius: 95, angle: 2.1, size: 0.25, orbitalPeriod: 0,
    highlight: 'Verst object ooit gemaakt door mensen — >24 miljard km van de Zon',
    desc: 'Voyager 1 is het verst van de Aarde verwijderde door mensen gemaakte object. In augustus 2012 passeerde het de heliopauze en bevindt zich nu in interstellaire ruimte. Radiosignalen doen er meer dan 22 uur over om de Aarde te bereiken.',
    facts: ['Gelanceerd 5 september 1977', 'Snelheid: ~17 km/s', 'Signaalvertraging: >22 uur', 'Nog steeds wetenschappelijke data sturen', 'Gouden plaat aan boord met aardse geluiden'],
    highlight2: 'NASA/JPL',
  },
  {
    id: 'jwst', name: 'James Webb ST', agency: 'NASA/ESA/CSA', color: '#c080ff', status: 'actief',
    icon: '🔭', launched: '25 dec 2021', body: 'L2-punt (1,5M km)',
    orbitRadius: 10.2, angle: 0.8, size: 0.3, orbitalPeriod: 365,
    highlight: 'Detecteerde mogelijke biosignaturen (DMS) op exoplaneet K2-18b',
    desc: 'De James Webb Space Telescope is een infrarood ruimtetelescoop in het Lagrangepunt L2, op 1,5 miljoen kilometer van de Aarde. Met een primaire spiegel van 6,5 meter observeert hij de vroegste sterrenstelsels en atmosferen van exoplaneten.',
    facts: ['Primaire spiegel: 6,5 meter', 'Golflengte: 0.6–28 μm infrarood', 'Operationeel since jul 2022', 'Koelt af tot –233°C', 'Kostprijs: ~$10 miljard'],
    highlight2: 'NASA/ESA/CSA',
  },
  {
    id: 'starship', name: 'SpaceX Starship', agency: 'SpaceX', color: '#3dcfdf', status: 'actief',
    icon: '🚀', launched: 'IFT-7 · Mrt 2026', body: 'Aardebaan',
    orbitRadius: 10.15, angle: 2.9, size: 0.28, orbitalPeriod: 0.003,
    highlight: 'Mechazilla-arm ving boosterkrap op bij IFT-7 testvlucht',
    desc: 'Starship is het volledig herbruikbare, tweefasige ruimtevaartuig van SpaceX. Het Super Heavy-booster met 33 Raptor-motoren brengt het Starship-voertuig in een baan rond de Aarde. Uiteindelijk bestemd voor lanceringen naar de Maan en Mars.',
    facts: ['Hoogte: 121 meter (volledig)', 'Super Heavy: 33 Raptor V2 motoren', 'Starship: 6 Raptor-motoren', 'Lading naar LEO: >100 ton', 'Volledig herbruikbaar ontwerp'],
    highlight2: 'SpaceX',
  },
  {
    id: 'smile', name: 'ESA SMILE', agency: 'ESA/CAS', color: '#ffa040', status: 'gepland',
    icon: '🛰️', launched: '9 apr 2026', body: 'Aardebaan (elliptisch)',
    orbitRadius: 10.18, angle: 4.5, size: 0.22, orbitalPeriod: 0.5,
    highlight: 'Eerste satelliet die magneetsfeer én aurora simultaan in beeld brengt',
    desc: 'SMILE (Solar wind Magnetosphere Ionosphere Link Explorer) is een ESA/CAS-missie die de dynamische koppeling tussen de zonnewind en de aardse magneetsfeer zal bestuderen met zachte röntgenkameras en UV-aurora-imaging tegelijkertijd.',
    facts: ['Lancering: 9 april 2026', 'Wetenschap-orbit: 3-daagse ellips', 'Instrumenten: SXI, UVI, LIA, MAG', 'Levensduur: 3 jaar nominaal', 'Partners: ESA + Chinese Academy of Sciences'],
    highlight2: 'ESA/CAS',
  },
  {
    id: 'perseverance', name: 'Perseverance', agency: 'NASA/JPL', color: '#ff6050', status: 'actief',
    icon: '🤖', launched: '30 jul 2020', body: 'Mars – Jezero-krater',
    orbitRadius: 15.2, angle: 1.4, size: 0.24, orbitalPeriod: 687,
    highlight: '>23 rotsmonsters verzameld voor mogelijke terugreis naar Aarde',
    desc: 'Perseverance is de meest geavanceerde Mars-rover ooit. Hij zoekt naar tekenen van vroeger microbieel leven in de Jezero-krater, ooit een meer. Aan boord: de Ingenuity-helikopter (eerste aangedreven vlucht op een andere planeet).',
    facts: ['Landde 18 februari 2021', 'Massa: 1.025 kg', 'Snelheid: max. 152 m/u', '23+ rotsmonsters in buisjes', 'Ingenuity maakte >70 vluchten'],
    highlight2: 'NASA/JPL',
  },
  {
    id: 'curiosity', name: 'Curiosity', agency: 'NASA/JPL', color: '#ff8a50', status: 'actief',
    icon: '🤖', launched: '26 nov 2011', body: 'Mars – Gale-krater',
    orbitRadius: 15.2, angle: 2.8, size: 0.22, orbitalPeriod: 687,
    highlight: '>4.400 Marsdagen actief — het langst actieve Mars-rover record',
    desc: 'Curiosity onderzoekt de geologische geschiedenis van de Gale-krater. Hij bevestigde dat Mars vroeger vloeibaar water had en bewoonbare omstandigheden kende voor micro-organismen. Loopt op nucleaire energie (RTG) en heeft geen zonnecel-afhankelijkheid.',
    facts: ['Landde 6 augustus 2012', 'Massa: 899 kg', 'Nucleaire energiebron (RTG)', 'Rijafstand: >32 km', 'Mount Sharp bestijging bezig'],
    highlight2: 'NASA/JPL',
  },
  {
    id: 'juice', name: 'ESA JUICE', agency: 'ESA', color: '#ffa040', status: 'actief',
    icon: '🪐', launched: '14 apr 2023', body: 'En route → Jupiter',
    orbitRadius: 52, angle: 0.4, size: 0.27, orbitalPeriod: 4333,
    highlight: 'Arriveert juli 2031 bij Jupiter na Venus+2×Aarde zwaartekrachtassist',
    desc: 'JUICE (Jupiter Icy Moons Explorer) onderzoekt de potentieel bewoonbare oceanen onder het ijs van Europa, Ganymede en Callisto. Na aankomst bij Jupiter in 2031 zal het in een baan om Ganymede gaan — de enige door een sonde geomicrobeerde maan.',
    facts: ['Lancering: 14 april 2023', 'Aankomst Jupiter: jul 2031', 'Massa: 6.070 kg (vol brandstof)', '10 wetenschappelijke instrumenten', 'Finale orbiet om Ganymede 2034'],
    highlight2: 'ESA',
  },
  {
    id: 'artemis2', name: 'Artemis II', agency: 'NASA', color: '#378ADD', status: 'gepland',
    icon: '🌕', launched: 'Q4 2026 (gepland)', body: 'Maanomloop',
    orbitRadius: 10.38, angle: 5.8, size: 0.22, orbitalPeriod: 0.07,
    highlight: 'Eerste bemande Maanmissie sinds Apollo 17 in 1972',
    desc: 'Artemis II is de eerste bemande Artemis-missie: vier astronauten vliegen met de Orion capsule via de SLS-raket in een vrije-retour-baan om de Maan. De vlucht bereidt NASA voor op Artemis III, waarbij astronauten daadwerkelijk landen op de Maanpool.',
    facts: ['Bemanning: 4 astronauten (incl. 1 Canadees)', 'Duur: ~10 dagen', 'Raket: SLS Block 1 + Orion MPCV', 'Traject: vrije-retour via Maan', 'Geen maanlanding — orbietale vlucht'],
    highlight2: 'NASA/CSA',
  },
]

// ── Scene setup ────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false })
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
renderer.setSize(window.innerWidth, window.innerHeight)
renderer.shadowMap.enabled = true
renderer.shadowMap.type = THREE.PCFSoftShadowMap
renderer.toneMapping = THREE.ACESFilmicToneMapping
renderer.toneMappingExposure = 0.9
document.body.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 2000)
camera.position.set(0, 55, 90)

const controls = new OrbitControls(camera, renderer.domElement)
controls.enableDamping = true
controls.dampingFactor = 0.07
controls.minDistance   = 2
controls.maxDistance   = 500
controls.autoRotate    = false
controls.autoRotateSpeed = 0.15

// ── Lighting ──────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x111133, 0.6)
scene.add(ambient)
const sunLight = new THREE.PointLight(0xfff4e0, 3.5, 400)
sunLight.castShadow = true
sunLight.shadow.mapSize.set(2048, 2048)
sunLight.shadow.camera.near = 0.1
sunLight.shadow.camera.far  = 400
scene.add(sunLight)

// ── Stars ─────────────────────────────────────────────────────────────────
{
  const geo  = new THREE.BufferGeometry()
  const pos  = []
  const cols = []
  for (let i = 0; i < 8000; i++) {
    const r = 400 + Math.random() * 800
    const t = Math.acos(2 * Math.random() - 1)
    const p = Math.random() * Math.PI * 2
    pos.push(r * Math.sin(t) * Math.cos(p), r * Math.sin(t) * Math.sin(p), r * Math.cos(t))
    const br = 0.5 + Math.random() * 0.5
    const hue = Math.random()
    if      (hue < 0.15) cols.push(0.7, 0.8, 1.0)       // blue
    else if (hue < 0.3)  cols.push(1.0, 0.95, 0.8)       // yellow
    else if (hue < 0.4)  cols.push(1.0, 0.7, 0.5)        // orange
    else                 cols.push(br, br, br)
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3))
  geo.setAttribute('color',    new THREE.Float32BufferAttribute(cols, 3))
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.35, vertexColors: true, transparent: true, opacity: 0.9, sizeAttenuation: true })))
}

// ── Helpers ────────────────────────────────────────────────────────────────
function hexColor(hex) {
  const n = parseInt(hex.replace('#',''), 16)
  return new THREE.Color((n>>16)/255, ((n>>8)&0xff)/255, (n&0xff)/255)
}
function makeGlow(radius, color, opacity = 0.18) {
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity, side: THREE.BackSide })
  return new THREE.Mesh(new THREE.SphereGeometry(radius * 1.6, 24, 24), mat)
}

// ── Sun ───────────────────────────────────────────────────────────────────
const sunGeo = new THREE.SphereGeometry(2.5, 48, 48)
const sunMat = new THREE.MeshBasicMaterial({ color: 0xfff0a0 })
const sun    = new THREE.Mesh(sunGeo, sunMat)
scene.add(sun)
const sunGlow1 = makeGlow(2.5, new THREE.Color(1, 0.85, 0.3), 0.22)
const sunGlow2 = makeGlow(2.5, new THREE.Color(1, 0.6, 0.1), 0.10)
sunGlow2.scale.set(1.5, 1.5, 1.5)
sun.add(sunGlow1, sunGlow2)

// ── Planets ────────────────────────────────────────────────────────────────
const PLANETS = [
  { name: 'Mercurius', r: 0.25, a: 3.9,  tilt: 0.03,  color: 0x8a7a6a, period: 88   },
  { name: 'Venus',     r: 0.55, a: 7.2,  tilt: 0.05,  color: 0xe8c060, period: 225  },
  { name: 'Aarde',     r: 0.6,  a: 10,   tilt: 0.41,  color: 0x4488cc, period: 365  },
  { name: 'Mars',      r: 0.38, a: 15.2, tilt: 0.44,  color: 0xcc5533, period: 687  },
  { name: 'Jupiter',   r: 1.5,  a: 52,   tilt: 0.05,  color: 0xc8a060, period: 4333 },
  { name: 'Saturnus',  r: 1.2,  a: 95,   tilt: 0.47,  color: 0xd4b878, period: 10759, rings: true },
]

const planetMeshes = {}
const orbitLines   = []
PLANETS.forEach(p => {
  // orbit ring
  const pts = []
  for (let i = 0; i <= 128; i++) {
    const a = (i / 128) * Math.PI * 2
    pts.push(new THREE.Vector3(Math.cos(a) * p.a, 0, Math.sin(a) * p.a))
  }
  const orb = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0x252858, transparent: true, opacity: 0.4 })
  )
  scene.add(orb)
  orbitLines.push(orb)

  // planet sphere
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(p.r, 32, 32),
    new THREE.MeshStandardMaterial({ color: p.color, roughness: 0.75, metalness: 0.1 })
  )
  mesh.castShadow = true
  mesh.receiveShadow = true
  // atmosphere glow
  mesh.add(makeGlow(p.r, new THREE.Color(p.color), 0.12))
  scene.add(mesh)
  planetMeshes[p.name] = { mesh, data: p }

  // Saturn rings
  if (p.rings) {
    const rGeo = new THREE.RingGeometry(p.r * 1.4, p.r * 2.4, 64)
    const rMat = new THREE.MeshBasicMaterial({ color: 0xc8a870, side: THREE.DoubleSide, transparent: true, opacity: 0.45 })
    const ring = new THREE.Mesh(rGeo, rMat)
    ring.rotation.x = Math.PI / 2.2
    mesh.add(ring)
  }
})

// Aarde – Maan
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(0.18, 24, 24),
  new THREE.MeshStandardMaterial({ color: 0x888899, roughness: 0.9 })
)
scene.add(moon)

// ── Mission markers ────────────────────────────────────────────────────────
const missionObjects = {}
const raycasterTargets = []

MISSIONS.forEach(m => {
  const col = hexColor(m.color)
  const geo = new THREE.SphereGeometry(m.size, 20, 20)
  const mat = new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 0.7, roughness: 0.3, metalness: 0.2 })
  const mesh = new THREE.Mesh(geo, mat)
  mesh.userData = { missionId: m.id }

  // outer ring
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(m.size * 1.5, m.size * 1.9, 32),
    new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.4, side: THREE.DoubleSide })
  )
  ring.rotation.x = Math.PI / 2
  mesh.add(ring)

  // point light
  const pl = new THREE.PointLight(col, 0.5, 5)
  mesh.add(pl)

  scene.add(mesh)
  missionObjects[m.id] = { mesh, ring, mat, col, pulseT: Math.random() * Math.PI * 2 }
  raycasterTargets.push(mesh)
})

// ── Label elements ─────────────────────────────────────────────────────────
const overlay = document.getElementById('labels-overlay')
const labelEls = {}
MISSIONS.forEach(m => {
  const el = document.createElement('div')
  el.className = 'label3d'
  el.innerHTML = `
    <div class="lline"></div>
    <div class="lname" style="color:${m.color}">${m.name}</div>
    <div class="lagency">${m.agency}</div>
  `
  overlay.appendChild(el)
  labelEls[m.id] = el
})

// ── Build mission list ─────────────────────────────────────────────────────
const listEl = document.getElementById('mission-list')
MISSIONS.forEach(m => {
  const item = document.createElement('div')
  item.className = 'mission-item'
  item.id = `ml-${m.id}`
  item.innerHTML = `
    <div class="mission-dot ${m.status}"></div>
    <div style="flex:1">
      <div class="mission-name">${m.name}</div>
      <div class="mission-sub">${m.body}</div>
      <div class="mission-agency" style="color:${m.color}">${m.agency}</div>
    </div>
    <span class="status-badge ${m.status}">${m.status}</span>
  `
  item.addEventListener('click', () => selectMission(m.id))
  listEl.appendChild(item)
})

// ── State ──────────────────────────────────────────────────────────────────
let showOrbits  = true
let showLabels  = false
let selectedId  = null
let speedFactor = 1
let panelOpen   = true

const clock = new THREE.Clock()
let elapsed = 0

// ── Raycaster ──────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster()
const mouse     = new THREE.Vector2()
raycaster.params.Points = { threshold: 0.5 }

renderer.domElement.addEventListener('click', e => {
  const rect = renderer.domElement.getBoundingClientRect()
  mouse.x =  ((e.clientX - rect.left)  / rect.width)  * 2 - 1
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1
  raycaster.setFromCamera(mouse, camera)
  const hits = raycaster.intersectObjects(raycasterTargets)
  if (hits.length) {
    const id = hits[0].object.userData.missionId
    selectMission(id)
  }
})

// ── Camera fly-to ──────────────────────────────────────────────────────────
let flyTarget    = null
let flyDuration  = 1.4
let flyT         = 1
let flyFrom      = new THREE.Vector3()
let flyFromLook  = new THREE.Vector3()
const defaultCamPos = new THREE.Vector3(0, 55, 90)

function selectMission(id) {
  selectedId = id
  const obj = missionObjects[id]
  if (!obj) return

  // update list highlight
  document.querySelectorAll('.mission-item').forEach(el => el.classList.remove('selected'))
  const li = document.getElementById(`ml-${id}`)
  if (li) { li.classList.add('selected'); li.scrollIntoView({ behavior: 'smooth', block: 'nearest' }) }

  // fly camera to mission
  flyFrom.copy(camera.position)
  flyFromLook.copy(controls.target)
  const mPos = obj.mesh.position
  const dist = camera.position.distanceTo(mPos)
  const targetDist = Math.max(4, obj.mesh.geometry.parameters.radius * 18)
  const dir = new THREE.Vector3().subVectors(camera.position, mPos).normalize()
  flyTarget   = { pos: mPos.clone().addScaledVector(dir, targetDist).add(new THREE.Vector3(0, targetDist * 0.5, 0)), look: mPos.clone() }
  flyT        = 0
  flyDuration = Math.max(0.8, Math.min(2, dist * 0.015))

  // show detail
  showDetail(id)
}

function showDetail(id) {
  const m = MISSIONS.find(x => x.id === id)
  if (!m) return
  const dp = document.getElementById('detail-panel')
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-hero fade-in">
      <div class="detail-hero-glow"></div>
      <span style="font-size:3.5rem;position:relative;z-index:1">${m.icon}</span>
    </div>
    <div class="detail-body fade-in">
      <div class="detail-agency" style="color:${m.color}">${m.agency}</div>
      <h2 class="detail-title">${m.name}</h2>
      <span class="status-badge ${m.status}" style="margin-bottom:16px;display:inline-flex">${m.status}</span>
      <p class="detail-desc">${m.desc}</p>
      <div class="detail-meta-grid">
        <div class="detail-meta-item">
          <div class="detail-meta-lbl">Lancering</div>
          <div class="detail-meta-val">${m.launched}</div>
        </div>
        <div class="detail-meta-item">
          <div class="detail-meta-lbl">Bestemming</div>
          <div class="detail-meta-val">${m.body}</div>
        </div>
      </div>
      <div class="detail-highlight">
        <div class="detail-highlight-text">✦ ${m.highlight}</div>
      </div>
      <div class="detail-section-lbl">Kernfeiten</div>
      <div class="detail-facts">
        ${m.facts.map(f => `<div class="detail-fact">${f}</div>`).join('')}
      </div>
    </div>
  `
  dp.classList.add('open')
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open')
  document.querySelectorAll('.mission-item').forEach(el => el.classList.remove('selected'))
  selectedId = null
}

function resetCamera() {
  flyFrom.copy(camera.position)
  flyFromLook.copy(controls.target)
  flyTarget  = { pos: defaultCamPos.clone(), look: new THREE.Vector3(0, 0, 0) }
  flyT       = 0
  flyDuration = 1.5
  closeDetail()
}

function togglePanel() {
  panelOpen = !panelOpen
  document.getElementById('missions-panel').classList.toggle('hidden', !panelOpen)
  document.getElementById('btn-panel').classList.toggle('active', panelOpen)
}

function toggleOrbits() {
  showOrbits = !showOrbits
  orbitLines.forEach(l => l.visible = showOrbits)
  document.getElementById('btn-orbits').classList.toggle('active', showOrbits)
}

function toggleLabels() {
  showLabels = !showLabels
  document.getElementById('btn-labels').classList.toggle('active', showLabels)
  Object.values(labelEls).forEach(el => el.style.opacity = showLabels ? '1' : '0')
}

function setSpeed(v) {
  speedFactor = parseFloat(v)
  document.getElementById('speed-val').textContent = v + '×'
}

// Expose globals
window.togglePanel  = togglePanel
window.toggleOrbits = toggleOrbits
window.toggleLabels = toggleLabels
window.resetCamera  = resetCamera
window.setSpeed     = setSpeed
window.closeDetail  = closeDetail

// ── Easing ─────────────────────────────────────────────────────────────────
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t }

// ── Planet position ────────────────────────────────────────────────────────
function planetPos(p, t) {
  const speed = p.period > 0 ? (Math.PI * 2) / p.period : 0
  const angle = speed * t
  return new THREE.Vector3(Math.cos(angle) * p.a, 0, Math.sin(angle) * p.a)
}

// ── Mission world position ────────────────────────────────────────────────
function missionPos(m, t) {
  if (m.id === 'voyager1') {
    // slowly drift outward
    const base = new THREE.Vector3(
      Math.cos(m.angle + t * 0.0001) * m.orbitRadius,
      Math.sin(t * 0.00003) * 8,
      Math.sin(m.angle + t * 0.0001) * m.orbitRadius
    )
    return base
  }
  if (m.id === 'juice') {
    // en route to Jupiter — interpolate between Earth distance and Jupiter
    const frac  = Math.min(1, t / (365 * 8)) // ~8 year trip
    const r     = 10 + frac * (52 - 10)
    const angle = m.angle + t * 0.0003
    return new THREE.Vector3(Math.cos(angle) * r, Math.sin(t * 0.0001) * 2, Math.sin(angle) * r)
  }
  if (m.id === 'jwst') {
    // L2 point — follow Earth + offset
    const earth = planetPos(PLANETS.find(p => p.name === 'Aarde'), t)
    const dir   = earth.clone().normalize()
    return earth.clone().add(dir.multiplyScalar(0.4))
  }
  if (m.id === 'smile' || m.id === 'starship') {
    const earth = planetPos(PLANETS.find(p => p.name === 'Aarde'), t)
    const orbitR = m.id === 'starship' ? 0.9 : 1.3
    const a = m.angle + t * (Math.PI * 2 / (m.orbitalPeriod || 1))
    return earth.clone().add(new THREE.Vector3(Math.cos(a) * orbitR, Math.sin(a * 0.3) * 0.2, Math.sin(a) * orbitR))
  }
  if (m.id === 'perseverance' || m.id === 'curiosity') {
    const mars = planetPos(PLANETS.find(p => p.name === 'Mars'), t)
    const a = m.angle + t * 0.01
    const r = m.id === 'perseverance' ? 0.65 : 0.8
    return mars.clone().add(new THREE.Vector3(Math.cos(a) * r, 0, Math.sin(a) * r))
  }
  if (m.id === 'artemis2') {
    const earth = planetPos(PLANETS.find(p => p.name === 'Aarde'), t)
    const a = m.angle + t * 0.3
    return earth.clone().add(new THREE.Vector3(Math.cos(a) * 1.5, Math.sin(a * 0.5) * 0.3, Math.sin(a) * 1.5))
  }
  // fallback
  const a = m.angle + t * (Math.PI * 2 / (m.orbitalPeriod || 1))
  return new THREE.Vector3(Math.cos(a) * m.orbitRadius, 0, Math.sin(a) * m.orbitRadius)
}

// ── Animate ────────────────────────────────────────────────────────────────
const tmpV = new THREE.Vector3()
function animate() {
  requestAnimationFrame(animate)
  const dt = clock.getDelta()
  elapsed += dt * speedFactor * 60

  // planets
  PLANETS.forEach(p => {
    const m = planetMeshes[p.name]
    if (!m) return
    const pos = planetPos(p, elapsed)
    m.mesh.position.copy(pos)
    m.mesh.rotation.y += dt * (2 * Math.PI / (p.period || 1)) * speedFactor * 10
  })

  // Moon
  {
    const earth = planetPos(PLANETS.find(p => p.name === 'Aarde'), elapsed)
    const ma = elapsed * 0.18
    moon.position.set(earth.x + Math.cos(ma) * 1.2, Math.sin(ma * 0.1) * 0.05, earth.z + Math.sin(ma) * 1.2)
  }

  // missions
  MISSIONS.forEach(m => {
    const obj = missionObjects[m.id]
    if (!obj) return
    obj.pulseT += dt * 2.5
    const pos = missionPos(m, elapsed)
    obj.mesh.position.copy(pos)

    // pulse emissive
    const pulse = Math.sin(obj.pulseT) * 0.3 + 0.7
    obj.mat.emissiveIntensity = m.status === 'actief' ? pulse * 0.9 : 0.3
    obj.ring.material.opacity = m.status === 'actief' ? pulse * 0.45 : 0.15

    // selected highlight
    if (selectedId === m.id) {
      obj.mat.emissiveIntensity = 1.4
      obj.ring.scale.set(1.3, 1.3, 1.3)
    } else {
      obj.ring.scale.set(1, 1, 1)
    }
  })

  // label positions
  if (showLabels) {
    MISSIONS.forEach(m => {
      const obj = missionObjects[m.id]
      const el  = labelEls[m.id]
      if (!obj || !el) return
      tmpV.copy(obj.mesh.position).project(camera)
      const x = (tmpV.x *  0.5 + 0.5) * window.innerWidth
      const y = (tmpV.y * -0.5 + 0.5) * window.innerHeight
      el.style.left = x + 'px'
      el.style.top  = y + 'px'
    })
  }

  // camera fly-to
  if (flyTarget && flyT < 1) {
    flyT = Math.min(1, flyT + dt / flyDuration)
    const e = easeInOut(flyT)
    camera.position.lerpVectors(flyFrom, flyTarget.pos, e)
    controls.target.lerpVectors(flyFromLook, flyTarget.look, e)
    if (flyT >= 1) flyTarget = null
  }

  // sun rotation
  sun.rotation.y += dt * 0.05

  controls.update()
  renderer.render(scene, camera)
}

// ── Resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(window.innerWidth, window.innerHeight)
})

// ── Keyboard ──────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetail(); resetCamera() }
  if (e.key === 'l' || e.key === 'L') toggleLabels()
  if (e.key === 'o' || e.key === 'O') toggleOrbits()
  if (e.key === 'm' || e.key === 'M') togglePanel()
})

// ── Start ──────────────────────────────────────────────────────────────────
animate()

// Auto-hide help after 7s
setTimeout(() => { document.getElementById('help').style.opacity = '0' }, 7000)
</script>
</body>
</html>
