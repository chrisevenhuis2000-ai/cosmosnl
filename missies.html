<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NightGazer · Ruimtemissies — 3D Zonnestelsel</title>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --night:#1A1A2E; --stellar:#378ADD; --cyan:#3dcfdf; --green:#3ddf90;
  --purple:#c080ff; --orange:#ffa040; --red:#ff6050;
  --muted:#8A9BC4; --dim:#4A5A8A; --border:#252858; --surface:#12132A;
  --fm:'JetBrains Mono','Courier New',monospace;
  --fd:'Georgia',serif;
}
html,body { width:100%; height:100%; overflow:hidden; background:#04050f; }
canvas { display:block; }

/* ── Topbar ── */
#topbar {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:54px; background:rgba(15,16,40,0.92); backdrop-filter:blur(16px);
  border-bottom:1px solid #252858;
  display:flex; align-items:center; justify-content:space-between; padding:0 20px; gap:12px;
}
.logo { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.logo img { height:32px; width:auto; }
.logo-text .t { font-family:var(--fd); font-size:0.95rem; color:#fff; font-weight:700; }
.logo-text .s { font-family:var(--fm); font-size:0.45rem; color:var(--dim); letter-spacing:.15em; text-transform:uppercase; }
.topbar-stats { display:flex; gap:20px; }
.stat { text-align:center; }
.stat-v { font-family:var(--fm); font-size:1rem; font-weight:700; color:var(--stellar); line-height:1; }
.stat-l { font-family:var(--fm); font-size:0.42rem; color:var(--dim); letter-spacing:.1em; text-transform:uppercase; margin-top:2px; }
.topbar-ctrls { display:flex; gap:6px; flex-shrink:0; }
.cb {
  font-family:var(--fm); font-size:0.5rem; letter-spacing:.08em; text-transform:uppercase;
  padding:5px 12px; border:1px solid var(--border); background:transparent;
  color:var(--muted); cursor:pointer; border-radius:2px; transition:all .15s;
}
.cb:hover,.cb.on { background:rgba(55,138,221,.14); border-color:var(--stellar); color:#fff; }

/* ── Left panel ── */
#mpanel {
  position:fixed; top:54px; left:0; bottom:0; z-index:90;
  width:272px; background:rgba(12,13,34,0.94); backdrop-filter:blur(16px);
  border-right:1px solid #252858; display:flex; flex-direction:column;
  transition:transform .3s ease;
}
#mpanel.hidden { transform:translateX(-272px); }
.ph {
  padding:14px 18px 11px; border-bottom:1px solid #252858;
  font-family:var(--fm); font-size:0.5rem; letter-spacing:.18em;
  text-transform:uppercase; color:var(--dim);
  display:flex; justify-content:space-between; align-items:center; flex-shrink:0;
}
.ph span:last-child { color:var(--stellar); }
#mlist { flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:#252858 transparent; }
.mi {
  display:flex; align-items:flex-start; gap:10px; padding:13px 18px;
  border-bottom:1px solid rgba(37,40,88,.4); cursor:pointer;
  transition:background .15s; border-left:2px solid transparent;
}
.mi:hover { background:rgba(55,138,221,.07); }
.mi.sel { background:rgba(55,138,221,.1); border-left-color:var(--stellar); }
.mdot {
  width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:5px;
}
.mdot.actief  { background:var(--green); animation:pdot 2s ease-in-out infinite; }
.mdot.gepland { background:var(--stellar); }
.mdot.voltooid{ background:var(--dim); }
.mi-body { flex:1; min-width:0; }
.mi-name { font-family:var(--fd); font-size:0.82rem; font-weight:700; color:#fff; line-height:1.25; }
.mi-loc  { font-family:var(--fm); font-size:0.48rem; color:var(--dim); margin-top:2px; letter-spacing:.06em; }
.mi-ag   { font-family:var(--fm); font-size:0.46rem; text-transform:uppercase; letter-spacing:.1em; margin-top:3px; }
.sb {
  font-family:var(--fm); font-size:0.42rem; letter-spacing:.1em; text-transform:uppercase;
  padding:2px 7px; border-radius:2px; flex-shrink:0; margin-top:3px;
}
.sb.actief  { background:rgba(61,223,144,.1); color:var(--green);  border:1px solid rgba(61,223,144,.3); }
.sb.gepland { background:rgba(55,138,221,.1); color:var(--stellar); border:1px solid rgba(55,138,221,.3); }
.sb.voltooid{ background:rgba(74,90,138,.1);  color:var(--dim);    border:1px solid rgba(74,90,138,.3); }

/* ── Detail panel ── */
#dpanel {
  position:fixed; top:54px; right:0; bottom:0; z-index:90;
  width:308px; background:rgba(10,11,30,0.97); backdrop-filter:blur(20px);
  border-left:1px solid #252858;
  transform:translateX(308px); transition:transform .35s cubic-bezier(.4,0,.2,1);
  display:flex; flex-direction:column; overflow:hidden;
}
#dpanel.open { transform:translateX(0); }
.dcl {
  position:absolute; top:14px; right:14px; width:26px; height:26px;
  background:none; border:1px solid #252858; color:var(--muted);
  cursor:pointer; border-radius:2px; display:flex; align-items:center; justify-content:center;
  font-size:.9rem; z-index:2; transition:all .15s;
}
.dcl:hover { border-color:var(--stellar); color:#fff; }
.dhero {
  height:130px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  font-size:3.2rem; border-bottom:1px solid #252858; position:relative; overflow:hidden;
}
.dhero-bg { position:absolute; inset:0; }
.dbody { padding:18px 18px 32px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:#252858 transparent; }
.dag  { font-family:var(--fm); font-size:0.48rem; letter-spacing:.14em; text-transform:uppercase; margin-bottom:6px; }
.dtit { font-family:var(--fd); font-size:1.25rem; font-weight:700; color:#fff; line-height:1.2; margin-bottom:10px; }
.ddesc { font-size:0.76rem; color:var(--muted); line-height:1.72; margin-bottom:18px; }
.dmg { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
.dmi { background:rgba(37,40,88,.35); padding:9px 11px; }
.dml { font-family:var(--fm); font-size:0.42rem; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin-bottom:3px; }
.dmv { font-family:var(--fm); font-size:0.6rem; color:#fff; }
.dhl { background:rgba(55,138,221,.06); border-left:2px solid rgba(55,138,221,.35); padding:9px 13px; margin-bottom:18px; font-family:var(--fm); font-size:0.56rem; color:var(--muted); line-height:1.6; }
.dsl { font-family:var(--fm); font-size:0.46rem; letter-spacing:.15em; text-transform:uppercase; color:var(--dim); margin-bottom:8px; }
.dfacts { display:flex; flex-direction:column; gap:5px; }
.dfact { font-size:0.71rem; color:var(--muted); line-height:1.55; padding-left:14px; position:relative; }
.dfact::before { content:'▸'; position:absolute; left:0; color:var(--stellar); font-size:.55rem; top:2px; }

/* ── Planet labels ── */
.plabel {
  position:absolute; pointer-events:none; transform:translate(-50%,-100%);
  font-family:var(--fm); font-size:0.5rem; letter-spacing:.1em; text-transform:uppercase;
  color:rgba(255,255,255,0.7); text-shadow:0 0 8px rgba(0,0,0,1),0 0 4px rgba(0,0,0,1);
  display:flex; flex-direction:column; align-items:center; gap:2px; white-space:nowrap;
}
.plabel-line { width:1px; height:12px; background:rgba(255,255,255,.25); }

/* ── Mission labels ── */
.mlabel {
  position:absolute; pointer-events:none; transform:translate(-50%,-100%);
  font-family:var(--fm); font-size:0.48rem; letter-spacing:.08em;
  text-shadow:0 0 10px rgba(0,0,0,1),0 0 5px rgba(0,0,0,1);
  display:flex; flex-direction:column; align-items:center; gap:2px; white-space:nowrap;
  transition:opacity .25s;
}
.mlabel-line { width:1px; height:14px; }
.mlabel-name { font-size:0.5rem; font-weight:700; }
.mlabel-ag   { font-size:0.42rem; opacity:.65; color:#fff; }

/* ── Speed bar ── */
#speedbar {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  z-index:80; display:flex; align-items:center; gap:10px;
  background:rgba(12,13,34,.8); padding:7px 18px;
  border:1px solid #252858; backdrop-filter:blur(8px);
}
#speedbar label { font-family:var(--fm); font-size:0.48rem; color:var(--dim); letter-spacing:.1em; }
#spd { width:90px; accent-color:var(--stellar); }
#spdv { font-family:var(--fm); font-size:0.5rem; color:var(--stellar); width:28px; }

/* ── Help ── */
#help {
  position:fixed; bottom:58px; left:50%; transform:translateX(-50%);
  z-index:80; font-family:var(--fm); font-size:0.47rem; letter-spacing:.08em;
  color:var(--dim); display:flex; gap:18px; align-items:center;
  background:rgba(12,13,34,.7); padding:7px 18px;
  border:1px solid #252858; backdrop-filter:blur(8px); transition:opacity .6s;
}
#help span { display:flex; gap:5px; align-items:center; }
kbd { background:rgba(37,40,88,.8); border:1px solid #252858; padding:1px 6px; border-radius:2px; font-family:var(--fm); font-size:0.44rem; color:#fff; }

/* ── Animations ── */
@keyframes pdot { 0%,100%{box-shadow:0 0 3px #3ddf90} 50%{box-shadow:0 0 10px #3ddf90;opacity:.7} }
@keyframes fi { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.fi { animation:fi .35s ease both; }
:focus-visible { outline:2px solid var(--stellar); outline-offset:2px; }
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:#252858; border-radius:2px; }
</style>
</head>
<body>

<header id="topbar">
  <div class="logo">
    <img src="/logo-transparent.png" alt="NightGazer" onerror="this.style.display='none'">
    <div class="logo-text">
      <div class="t">Ruimtemissies</div>
      <div class="s">Interactief 3D Zonnestelsel</div>
    </div>
  </div>
  <div class="topbar-stats">
    <div class="stat"><div class="stat-v">5</div><div class="stat-l">Actief</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--cyan)">2</div><div class="stat-l">Gepland</div></div>

<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

// ═══════════════════════════════════════════════════════════════════════════
// PROCEDURAL PLANET TEXTURES
// ═══════════════════════════════════════════════════════════════════════════
function makeTex(w, h, fn) {
  const c = document.createElement('canvas')
  c.width = w; c.height = h
  fn(c.getContext('2d'), w, h)
  return new THREE.CanvasTexture(c)
}

// Noise helpers
function noise(x, y, seed = 0) {
  const s = Math.sin(x * 127.1 + y * 311.7 + seed) * 43758.5453
  return s - Math.floor(s)
}
function fbm(x, y, oct = 5, seed = 0) {
  let v = 0, a = 0.5, f = 1, mx = 0
  for (let i = 0; i < oct; i++) {
    v += a * noise(x * f, y * f, seed + i * 7)
    mx += a; a *= 0.5; f *= 2.1
  }
  return v / mx
}

function makeSunTex() {
  return makeTex(512, 256, (ctx, w, h) => {
    const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w*0.6)
    grad.addColorStop(0,   '#fff8c0')
    grad.addColorStop(0.3, '#ffdd40')
    grad.addColorStop(0.7, '#ff9910')
    grad.addColorStop(1,   '#cc5500')
    ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h)
    for (let i = 0; i < 60; i++) {
      const x = Math.random() * w, y = Math.random() * h
      const r = 4 + Math.random() * 18
      const g2 = ctx.createRadialGradient(x, y, 0, x, y, r)
      g2.addColorStop(0,   'rgba(140,60,0,0.55)')
      g2.addColorStop(0.5, 'rgba(180,80,0,0.2)')
      g2.addColorStop(1,   'rgba(0,0,0,0)')
      ctx.fillStyle = g2
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill()
    }
  })
}

function makeMercuryTex() {
  return makeTex(512, 256, (ctx, w, h) => {
    const idata = ctx.createImageData(w, h)
    for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
      const n = fbm(x/w*4, y/h*4, 6, 1)
      const v = Math.floor(100 + n * 90)
      const i = (y * w + x) * 4
      idata.data[i]   = v + 12
      idata.data[i+1] = v + 5
      idata.data[i+2] = v
      idata.data[i+3] = 255
    }
    ctx.putImageData(idata, 0, 0)
    // craters
    for (let k = 0; k < 40; k++) {
      const cx = Math.random() * w, cy = Math.random() * h
      const r  = 3 + Math.random() * 18
      const g  = ctx.createRadialGradient(cx, cy, r*0.3, cx, cy, r)
      g.addColorStop(0,   'rgba(60,50,40,0.7)')
      g.addColorStop(0.7, 'rgba(40,35,30,0.35)')
      g.addColorStop(1,   'rgba(180,160,140,0.2)')
      ctx.fillStyle = g
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill()
    }
  })
}

function makeVenusTex() {
  return makeTex(512, 256, (ctx, w, h) => {
    ctx.fillStyle = '#c8a855'; ctx.fillRect(0, 0, w, h)
    for (let y = 0; y < h; y++) {
      const n1 = Math.sin(y * 0.08 + 1.2) * 0.4 + Math.sin(y * 0.17 + 2.5) * 0.3
      const bright = 0.72 + n1 * 0.15
      const col = `rgba(${Math.floor(200 * bright)},${Math.floor(160 * bright)},${Math.floor(60 * bright)},0.45)`
      ctx.fillStyle = col
      ctx.fillRect(0, y, w, 1)
    }
    // cloud swirls
    for (let k = 0; k < 12; k++) {
      const cx = Math.random() * w, cy = Math.random() * h, r = 20 + Math.random() * 60
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r)
      g.addColorStop(0,   'rgba(255,240,180,0.3)')
      g.addColorStop(1,   'rgba(0,0,0,0)')
      ctx.fillStyle = g
      ctx.beginPath(); ctx.ellipse(cx, cy, r, r * 0.35, 0, 0, Math.PI*2); ctx.fill()
    }
  })
}

function makeEarthTex() {
  return makeTex(1024, 512, (ctx, w, h) => {
    ctx.fillStyle = '#1040a0'; ctx.fillRect(0, 0, w, h)
    const continents = [
      // North America
      [{x:.05,y:.25},{x:.22,y:.18},{x:.25,y:.38},{x:.16,y:.55},{x:.08,y:.52},{x:.04,y:.38}],
      // South America
      [{x:.16,y:.55},{x:.23,y:.52},{x:.25,y:.72},{x:.18,y:.82},{x:.12,y:.78},{x:.13,y:.62}],
      // Europe
      [{x:.44,y:.2},{x:.56,y:.17},{x:.57,y:.3},{x:.5,y:.35},{x:.42,y:.3}],
      // Africa
      [{x:.47,y:.33},{x:.58,y:.3},{x:.6,y:.55},{x:.55,y:.73},{x:.46,y:.72},{x:.43,y:.55}],
      // Asia (large)
      [{x:.56,y:.15},{x:.82,y:.1},{x:.9,y:.18},{x:.88,y:.38},{x:.78,y:.45},{x:.65,y:.48},{x:.57,y:.42},{x:.55,y:.28}],
      // Australia
      [{x:.74,y:.6},{x:.86,y:.58},{x:.9,y:.68},{x:.84,y:.75},{x:.74,y:.73}],
      // Greenland
      [{x:.24,y:.08},{x:.34,y:.06},{x:.37,y:.18},{x:.28,y:.22},{x:.22,y:.18}],
    ]
    continents.forEach(pts => {
      ctx.beginPath()
      ctx.moveTo(pts[0].x * w, pts[0].y * h)
      pts.forEach(p => ctx.lineTo(p.x * w, p.y * h))
      ctx.closePath()
      ctx.fillStyle = '#2d6e28'
      ctx.fill()
      // elevated interior
      const g = ctx.createLinearGradient(pts[0].x*w, pts[0].y*h, pts[2].x*w, pts[2].y*h)
      g.addColorStop(0,   'rgba(100,150,60,0.3)')
      g.addColorStop(0.5, 'rgba(60,100,30,0.15)')
      g.addColorStop(1,   'rgba(0,0,0,0)')
      ctx.fillStyle = g; ctx.fill()
    })
    // Sahara/desert tones
    ctx.fillStyle = 'rgba(180,140,60,0.28)'
    ctx.beginPath(); ctx.ellipse(0.5*w, 0.45*h, 70, 35, 0, 0, Math.PI*2); ctx.fill()
    // North pole ice cap
    const np = ctx.createRadialGradient(w/2, 0, 0, w/2, 0, h*0.16)
    np.addColorStop(0,   'rgba(220,235,255,0.95)')
    np.addColorStop(0.7, 'rgba(200,220,255,0.5)')
    np.addColorStop(1,   'rgba(0,0,0,0)')
    ctx.fillStyle = np; ctx.fillRect(0, 0, w, h * 0.16)
    // South pole
    const sp = ctx.createRadialGradient(w/2, h, 0, w/2, h, h*0.16)
    sp.addColorStop(0,   'rgba(230,240,255,0.9)')
    sp.addColorStop(1,   'rgba(0,0,0,0)')
    ctx.fillStyle = sp; ctx.fillRect(0, h*0.86, w, h*0.14)
    // cloud layer
    for (let k = 0; k < 18; k++) {
      const cx = Math.random()*w, cy = Math.random()*h, r = 25+Math.random()*80
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r)
      g.addColorStop(0,   'rgba(255,255,255,0.18)')
      g.addColorStop(1,   'rgba(0,0,0,0)')
      ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(cx, cy, r, r*0.4, 0, 0, Math.PI*2); ctx.fill()
    }
    // Ocean shimmer
    const og = ctx.createLinearGradient(0,0,0,h)
    og.addColorStop(0, 'rgba(20,80,180,0.2)')
    og.addColorStop(1, 'rgba(0,30,100,0.2)')
    ctx.fillStyle = og; ctx.fillRect(0, 0, w, h)
  })
}

function makeMarsTex() {
  return makeTex(512, 256, (ctx, w, h) => {
    const idata = ctx.createImageData(w, h)
    for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
      const n = fbm(x/w*3.5, y/h*3.5, 5, 3)
      const i = (y * w + x) * 4
      idata.data[i]   = Math.floor(160 + n*70)
      idata.data[i+1] = Math.floor(60  + n*40)
      idata.data[i+2] = Math.floor(20  + n*15)
      idata.data[i+3] = 255
    }
    ctx.putImageData(idata, 0, 0)
    // Valles Marineris canyon
    ctx.strokeStyle = 'rgba(80,20,10,0.55)'; ctx.lineWidth = 6
    ctx.beginPath(); ctx.moveTo(w*0.35, h*0.48); ctx.bezierCurveTo(w*0.5, h*0.46, w*0.65, h*0.5, w*0.75, h*0.52); ctx.stroke()
    // North polar cap
    const np = ctx.createRadialGradient(w/2, 0, 0, w/2, 0, h*0.18)
    np.addColorStop(0,'rgba(240,230,220,0.9)'); np.addColorStop(1,'rgba(0,0,0,0)')
    ctx.fillStyle = np; ctx.fillRect(0, 0, w, h*0.18)
    // South polar cap
    const sp = ctx.createRadialGradient(w/2, h, 0, w/2, h, h*0.14)
    sp.addColorStop(0,'rgba(230,220,210,0.85)'); sp.addColorStop(1,'rgba(0,0,0,0)')
    ctx.fillStyle = sp; ctx.fillRect(0, h*0.86, w, h*0.14)
    // Olympus Mons region (darker elevated area)
    const om = ctx.createRadialGradient(w*0.22, h*0.38, 0, w*0.22, h*0.38, 35)
    om.addColorStop(0,'rgba(120,40,10,0.5)'); om.addColorStop(1,'rgba(0,0,0,0)')
    ctx.fillStyle = om; ctx.beginPath(); ctx.arc(w*0.22, h*0.38, 35, 0, Math.PI*2); ctx.fill()
  })
}

function makeJupiterTex() {
  return makeTex(1024, 512, (ctx, w, h) => {
    const bands = [
      {y:0,   h:.06, c:'#c8a870'}, {y:.06, h:.05, c:'#a07840'}, {y:.11, h:.06, c:'#d4b880'},
      {y:.17, h:.04, c:'#b88c50'}, {y:.21, h:.08, c:'#e0c488'}, {y:.29, h:.05, c:'#c09060'},
      {y:.34, h:.10, c:'#dcc07a'}, {y:.44, h:.04, c:'#aa7848'}, {y:.48, h:.08, c:'#e4c882'},
      {y:.56, h:.05, c:'#b88c5a'}, {y:.61, h:.07, c:'#d0b070'}, {y:.68, h:.04, c:'#a07035'},
      {y:.72, h:.08, c:'#ddb878'}, {y:.80, h:.06, c:'#b08048'}, {y:.86, h:.07, c:'#c8a060'},
      {y:.93, h:.07, c:'#a87838'},
    ]
    bands.forEach(b => {
      ctx.fillStyle = b.c; ctx.fillRect(0, b.y*h, w, b.h*h)
      // wavy edge
      const wg = ctx.createLinearGradient(0, b.y*h, 0, b.y*h + b.h*h)
      wg.addColorStop(0,'rgba(0,0,0,0.08)'); wg.addColorStop(0.5,'rgba(0,0,0,0)'); wg.addColorStop(1,'rgba(0,0,0,0.06)')
      ctx.fillStyle = wg; ctx.fillRect(0, b.y*h, w, b.h*h)
    })
    // Great Red Spot
    const grs = ctx.createRadialGradient(w*.62, h*.57, 0, w*.62, h*.57, 40)
    grs.addColorStop(0,'rgba(180,60,40,0.85)'); grs.addColorStop(0.6,'rgba(160,50,30,0.55)'); grs.addColorStop(1,'rgba(0,0,0,0)')
    ctx.fillStyle = grs; ctx.beginPath(); ctx.ellipse(w*.62, h*.57, 40, 25, 0, 0, Math.PI*2); ctx.fill()
    const grs2 = ctx.createRadialGradient(w*.62, h*.57, 0, w*.62, h*.57, 20)
    grs2.addColorStop(0,'rgba(220,100,70,0.6)'); grs2.addColorStop(1,'rgba(0,0,0,0)')
    ctx.fillStyle = grs2; ctx.beginPath(); ctx.arc(w*.62, h*.57, 20, 0, Math.PI*2); ctx.fill()
    // turbulence details
    for (let k = 0; k < 30; k++) {
      const cx = Math.random()*w, cy = Math.random()*h, r = 8+Math.random()*30
      const g = ctx.createRadialGradient(cx,cy,0,cx,cy,r)
      g.addColorStop(0,'rgba(100,60,20,0.12)'); g.addColorStop(1,'rgba(0,0,0,0)')
      ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(cx,cy,r,r*0.3,0,0,Math.PI*2); ctx.fill()
    }
  })
}

function makeSaturnTex() {
  return makeTex(512, 256, (ctx, w, h) => {
    const bands = [
      {y:0,  h:.08,c:'#e0cc90'},{y:.08,h:.06,c:'#c8a860'},{y:.14,h:.10,c:'#e8d898'},
      {y:.24,h:.05,c:'#d0b870'},{y:.29,h:.12,c:'#eedca0'},{y:.41,h:.06,c:'#c4a45a'},
      {y:.47,h:.10,c:'#e6d490'},{y:.57,h:.05,c:'#caa860'},{y:.62,h:.10,c:'#dcc880'},
      {y:.72,h:.08,c:'#c0944e'},{y:.80,h:.12,c:'#dac478'},{y:.92,h:.08,c:'#b88840'},
    ]
    bands.forEach(b => { ctx.fillStyle=b.c; ctx.fillRect(0,b.y*h,w,b.h*h) })
    for (let k=0;k<15;k++){
      const cx=Math.random()*w,cy=Math.random()*h,r=5+Math.random()*20
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r)
      g.addColorStop(0,'rgba(160,110,30,0.1)'); g.addColorStop(1,'rgba(0,0,0,0)')
      ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(cx,cy,r,r*0.35,0,0,Math.PI*2); ctx.fill()
    }
  })
}

function makeMoonTex() {
  return makeTex(512, 256, (ctx, w, h) => {
    const idata = ctx.createImageData(w, h)
    for (let y=0;y<h;y++) for (let x=0;x<w;x++){
      const n = fbm(x/w*5, y/h*5, 4, 9)
      const v = Math.floor(100+n*70)
      const i = (y*w+x)*4
      idata.data[i]=v+5; idata.data[i+1]=v+3; idata.data[i+2]=v+8; idata.data[i+3]=255
    }
    ctx.putImageData(idata, 0, 0)
    // Mare (dark seas)
    const mares = [{x:.3,y:.35,rx:60,ry:45},{x:.55,y:.4,rx:45,ry:35},{x:.45,y:.6,rx:35,ry:28}]
    mares.forEach(m => {
      const g=ctx.createRadialGradient(m.x*w,m.y*h,0,m.x*w,m.y*h,m.rx)
      g.addColorStop(0,'rgba(50,45,55,0.55)'); g.addColorStop(1,'rgba(0,0,0,0)')
      ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(m.x*w,m.y*h,m.rx,m.ry,0,0,Math.PI*2); ctx.fill()
    })
    for (let k=0;k<35;k++){
      const cx=Math.random()*w,cy=Math.random()*h,r=2+Math.random()*12
      const g=ctx.createRadialGradient(cx,cy,r*.2,cx,cy,r)
      g.addColorStop(0,'rgba(50,45,55,0.5)'); g.addColorStop(.7,'rgba(40,35,45,.2)'); g.addColorStop(1,'rgba(180,175,185,.15)')
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill()
    }
  })
}

// Stars
{
  const geo = new THREE.BufferGeometry()
  const pos = [], col = []
  for (let i = 0; i < 9000; i++) {
    const r=600+Math.random()*900, t=Math.acos(2*Math.random()-1), p=Math.random()*Math.PI*2
    pos.push(r*Math.sin(t)*Math.cos(p), r*Math.sin(t)*Math.sin(p), r*Math.cos(t))
    const h=Math.random()
    if(h<.12) col.push(.7,.8,1)
    else if(h<.25) col.push(1,.95,.75)
    else if(h<.35) col.push(1,.7,.45)

  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3))
  geo.setAttribute('color',    new THREE.Float32BufferAttribute(col,3))
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ size:.28, vertexColors:true, transparent:true, opacity:.9, sizeAttenuation:true })))
}

const PLANET_DATA = [
  { name:'Mercurius', au:.39,  r:.22, tex:makeMercuryTex(), rot:.03,  period:88    },
  { name:'Venus',     au:.72,  r:.50, tex:makeVenusTex(),   rot:.002, period:225   },
  { name:'Aarde',     au:1.0,  r:.55, tex:makeEarthTex(),   rot:.41,  period:365   },
  { name:'Mars',      au:1.52, r:.33, tex:makeMarsTex(),    rot:.44,  period:687   },
  { name:'Jupiter',   au:5.2,  r:1.4, tex:makeJupiterTex(), rot:.05,  period:4333  },
  { name:'Saturnus',  au:9.55, r:1.1, tex:makeSaturnTex(),  rot:.47,  period:10759, rings:true },
]
const SCALE = 10   // 1 AU → 10 scene units

const planetMeshes = {}
const orbitLines   = []

PLANET_DATA.forEach(p => {
  const a = p.au * SCALE
  // orbit ring
  const pts = []
  for (let i=0;i<=128;i++) { const ang=i/128*Math.PI*2; pts.push(new THREE.Vector3(Math.cos(ang)*a,0,Math.sin(ang)*a)) }
  const oLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({color:0x252858,transparent:true,opacity:.35}))
  scene.add(oLine); orbitLines.push(oLine)

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(p.r, 36, 36),
    new THREE.MeshStandardMaterial({ map:p.tex, roughness:.7, metalness:.05 })
  )
  mesh.castShadow = true; mesh.receiveShadow = true
  mesh.add(glow(p.r, new THREE.Color(p.tex?0x8899bb:0x8899bb), .08))
  scene.add(mesh)
  planetMeshes[p.name] = { mesh, data:p }

  if (p.rings) {
    const rg = new THREE.RingGeometry(p.r*1.35, p.r*2.35, 80)
    // Add radial UV variation for ring coloring
    const rm = new THREE.MeshBasicMaterial({ color:0xc8b068, side:THREE.DoubleSide, transparent:true, opacity:.55 })
    const ring = new THREE.Mesh(rg, rm)
    ring.rotation.x = Math.PI/2.1
    mesh.add(ring)
    // inner dark band
    const rg2 = new THREE.RingGeometry(p.r*1.35, p.r*1.65, 80)
    const rm2 = new THREE.MeshBasicMaterial({ color:0x8a6030, side:THREE.DoubleSide, transparent:true, opacity:.3 })
    mesh.add(new THREE.Mesh(rg2, rm2))
  }
})

// MISSION SELECTION (panel only)
// ═══════════════════════════════════════════════════════════════════════════
function selectMission(id) {
  selId = id
  document.querySelectorAll('.mi').forEach(e => e.classList.remove('sel'))
  const li = document.getElementById(`mi-${id}`)
  if (li) { li.classList.add('sel'); li.scrollIntoView({ behavior:'smooth', block:'nearest' }) }

  // fly camera
  const obj = missionObjs[id]
  if (obj) {
    const mp  = obj.mesh.position
    const dir = new THREE.Vector3().subVectors(camera.position, mp).normalize()
    const td  = Math.max(5, mp.length() * 0.18 + 3)
    flyTo(
      mp.clone().addScaledVector(dir, td).add(new THREE.Vector3(0, td*.45, 0)),
      mp.clone(),
      Math.max(1, Math.min(2.5, camera.position.distanceTo(mp) * 0.012))
    )
  }
  renderDetail(id)
}

function renderDetail(id) {
  const m = MISSIONS.find(x => x.id===id)
  if (!m) return
  document.getElementById('dcontent').innerHTML = `
    <div class="dhero fi">
      <div class="dhero-bg" style="background:linear-gradient(135deg,${m.bgfrom},${m.bgto})"></div>
      <div style="position:relative;z-index:1;font-size:3.2rem">${m.icon}</div>
    </div>
    <div class="dbody fi">
      <div class="dag" style="color:${m.color}">${m.agency}</div>
      <h2 class="dtit">${m.name}</h2>
      <span class="sb ${m.status}" style="margin-bottom:14px;display:inline-flex">${m.status}</span>
      <p class="ddesc">${m.desc}</p>
      <div class="dmg">
        <div class="dmi"><div class="dml">Lancering</div><div class="dmv">${m.launched_meta}</div></div>
        <div class="dmi"><div class="dml">Bestemming</div><div class="dmv">${m.dest_meta}</div></div>
      </div>
      <div class="dhl">✦ ${m.hl}</div>
      <div class="dsl">Kernfeiten</div>
      <div class="dfacts">${m.facts.map(f=>`<div class="dfact">${f}</div>`).join('')}</div>
    </div>
  `
  document.getElementById('dpanel').classList.add('open')
}

function closeDp() {
  document.getElementById('dpanel').classList.remove('open')
  document.querySelectorAll('.mi').forEach(e=>e.classList.remove('sel'))
  selId = null
}
function resetCam() {
  flyTo(defCam, new THREE.Vector3(0,0,0), 1.6)
  closeDp()
}
function togglePanel()   { panelOpen=!panelOpen; document.getElementById('mpanel').classList.toggle('hidden',!panelOpen); document.getElementById('btn-panel').classList.toggle('on',panelOpen) }
function toggleOrbits()  { orbitsVis=!orbitsVis; orbitLines.forEach(l=>l.visible=orbitsVis); document.getElementById('btn-orbits').classList.toggle('on',orbitsVis) }
function toggleMLabels() { mLabelsVis=!mLabelsVis; document.getElementById('btn-mlabels').classList.toggle('on',mLabelsVis) }
function setSpd(v)       { speed=parseFloat(v); document.getElementById('spdv').textContent=v+'×' }

window.togglePanel  = togglePanel
window.toggleOrbits = toggleOrbits
window.toggleMLabels= toggleMLabels
window.setSpd       = setSpd
window.resetCam     = resetCam
window.closeDp      = closeDp

// ═══════════════════════════════════════════════════════════════════════════
// PLANET POSITIONS
// ═══════════════════════════════════════════════════════════════════════════
function getPlanetPos(p, t) {
  const a   = p.au * SCALE
  const spd = (Math.PI * 2) / p.period
  const ang = spd * t
  return new THREE.Vector3(Math.cos(ang) * a, 0, Math.sin(ang) * a)
}

// ═══════════════════════════════════════════════════════════════════════════
// MISSION POSITIONS (accurate)
// ═══════════════════════════════════════════════════════════════════════════
function getMissionPos(m, t) {
  const earth   = getPlanetPos(PLANET_DATA[2], t)    // Aarde
  const mars    = getPlanetPos(PLANET_DATA[3], t)    // Mars
  const jupiter = getPlanetPos(PLANET_DATA[4], t)    // Jupiter
  const venus   = getPlanetPos(PLANET_DATA[1], t)    // Venus

  switch (m.id) {
    case 'voyager1': {
      // Interstellar space — place far in consistent direction
      const ang = 2.1
      return new THREE.Vector3(Math.cos(ang)*90, Math.sin(t*0.00006)*8, Math.sin(ang)*90)
    }
    case 'jwst': {
      // L2: 1.5M km past Earth along Earth-Sun line (0.01 AU = 0.1 scene units)
      const dir = earth.clone().normalize()
      return earth.clone().add(dir.multiplyScalar(0.5))
    }
    case 'starship': {
      // Low Earth orbit: tight orbit around Earth
      const a = t * (Math.PI*2 / 0.003) // very fast orbit
      return earth.clone().add(new THREE.Vector3(Math.cos(a)*.75, Math.sin(a*.2)*.1, Math.sin(a)*.75))
    }
    case 'smile': {
      // Highly elliptical Earth orbit (up to 120k km) — show as wide ellipse
      const a = t * (Math.PI*2 / 0.5)
      return earth.clone().add(new THREE.Vector3(Math.cos(a)*1.2, Math.sin(a*.35)*.25, Math.sin(a)*1.2))
    }
    case 'perseverance': {
      // On Mars surface
      const a = t * 0.008
      return mars.clone().add(new THREE.Vector3(Math.cos(a)*.48, 0, Math.sin(a)*.48))
    }
    case 'curiosity': {
      // On Mars surface, different longitude
      const a = t * 0.006 + 2.2
      return mars.clone().add(new THREE.Vector3(Math.cos(a)*.58, 0, Math.sin(a)*.58))
    }
    case 'juice': {
      // As of Mar 2026: past Venus flyby (Aug 2025), heading toward 2nd Earth flyby (Nov 2026)
      // Approx 0.85 AU from Sun, between Venus and Earth orbits
      // We'll slowly move it from Venus orbit toward Earth orbit
      const yearFrac  = (t % 365) / 365
      const venusR    = .72 * SCALE
      const earthR    = 1.0 * SCALE
      // JUICE journey overall: ~8.3 years Earth→Earth (Nov 2026)
      // From launch Apr 2023 to now Mar 2026 = ~2.9 years / 8.3 = 35% of journey
      const tripFrac  = Math.min(1, t / (365 * 8.3))
      const curR      = venusR + (earthR - venusR) * Math.min(1, tripFrac * 3)
      const ang       = 0.4 + t * .0003
      return new THREE.Vector3(Math.cos(ang)*curR, Math.sin(t*.00008)*1.5, Math.sin(ang)*curR)
    }
    case 'artemis2': {
      // Planned — show near Moon as orbiting mission
      const earthP = getPlanetPos(PLANET_DATA[2], t)
      const ma     = t * 0.22
      const moonP  = earthP.clone().add(new THREE.Vector3(Math.cos(ma)*1.15, Math.sin(ma*.1)*.05, Math.sin(ma)*1.15))
      // Artemis orbit is 3-day free-return — show around Moon
      const a2 = t * 0.5
      return moonP.clone().add(new THREE.Vector3(Math.cos(a2)*.6, Math.sin(a2*.3)*.15, Math.sin(a2)*.6))
    }
    default:
      return earth.clone()
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// PROJECT 3D → 2D
// ═══════════════════════════════════════════════════════════════════════════
const tmp3 = new THREE.Vector3()
function project(pos) {
  tmp3.copy(pos).project(camera)
  return {
    x: (tmp3.x *  .5 + .5) * innerWidth,
    y: (tmp3.y * -.5 + .5) * innerHeight,
    behind: tmp3.z > 1
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// ANIMATE
// ═══════════════════════════════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate)
  const dt = clock.getDelta()
  elapsed += dt * speed * 60

  // Planets
  PLANET_DATA.forEach(p => {
    const pm = planetMeshes[p.name]
    if (!pm) return
    pm.mesh.position.copy(getPlanetPos(p, elapsed))
    pm.mesh.rotation.y += dt * (Math.PI*2 / (p.period||1)) * speed * 8
  })

  // Moon
  {
    const ep = getPlanetPos(PLANET_DATA[2], elapsed)
    const ma = elapsed * 0.18
    moonMesh.position.set(ep.x+Math.cos(ma)*1.15, Math.sin(ma*.08)*.04, ep.z+Math.sin(ma)*1.15)
  }

  // Sun
  sun.rotation.y += dt * 0.04

  // Missions
  MISSIONS.forEach(m => {
    const obj = missionObjs[m.id]
    if (!obj) return
    obj.pt += dt * 2.2
    obj.mesh.position.copy(getMissionPos(m, elapsed))
    const p = Math.sin(obj.pt)*.3+.7
    obj.mat.emissiveIntensity = m.status==='actief' ? p*.9 : .3
    obj.ring.material.opacity = m.status==='actief' ? p*.5 : .18
    if (selId===m.id) { obj.mat.emissiveIntensity=1.6; obj.ring.scale.set(1.4,1.4,1.4) }
    else              { obj.ring.scale.set(1,1,1) }
  })

  // Planet labels (always visible)
  PLANET_DATA.forEach(p => {
    const pm = planetMeshes[p.name]
    const el = pLabels[p.name]
    if (!pm||!el) return
    const tp = pm.mesh.position.clone().add(new THREE.Vector3(0, p.r+.4, 0))
    const sc = project(tp)
    if (sc.behind) { el.style.display='none'; return }
    el.style.display='flex'; el.style.left=sc.x+'px'; el.style.top=sc.y+'px'
  })
  // Moon label
  {
    const mp = moonMesh.position.clone().add(new THREE.Vector3(0,.3,0))
    const sc = project(mp)
    moonLbl.style.display = sc.behind ? 'none' : 'flex'
    moonLbl.style.left=sc.x+'px'; moonLbl.style.top=sc.y+'px'
  }

  // Mission labels
  MISSIONS.forEach(m => {
    const obj = missionObjs[m.id]
    const el  = mLabels[m.id]
    if (!obj||!el) return
    el.style.display = mLabelsVis ? 'flex' : 'none'
    if (!mLabelsVis) return
    const tp = obj.mesh.position.clone().add(new THREE.Vector3(0,.45,0))
    const sc = project(tp)
    if (sc.behind) { el.style.display='none'; return }
    el.style.left=sc.x+'px'; el.style.top=sc.y+'px'
    // fade by distance
    const dist = camera.position.distanceTo(obj.mesh.position)
    el.style.opacity = Math.max(0, Math.min(1, (80-dist)/60)).toString()
  })

  // Camera fly-to
  if (flyTarget && flyT < 1) {
    flyT = Math.min(1, flyT + dt/flyDur)
    const e = eio(flyT)
    camera.position.lerpVectors(flyFrom, flyTarget.pos, e)
    controls.target.lerpVectors(flyFromLook, flyTarget.look, e)
    if (flyT>=1) flyTarget=null
  }

  controls.update()
  renderer.render(scene, camera)
}

// Resize
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})

// Keyboard
window.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeDp(); resetCam() }
  if (e.key==='l'||e.key==='L') toggleMLabels()
  if (e.key==='o'||e.key==='O') toggleOrbits()
  if (e.key==='m'||e.key==='M') togglePanel()
})

animate()
setTimeout(()=>{ document.getElementById('help').style.opacity='0' }, 8000)
</script>
