name: 🚀 Build & Deploy naar Plesk
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Dependencies installeren
        run: npm ci

      - name: 🔨 Statische build maken
        env:
          NEXT_PUBLIC_NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: npm run build

      - name: 🔧 Pagina's en artikel slugs als index.html mappen
        run: |
          # Top-level pagina's (educatie, missies, sterrenkijken, etc.)
          cd out
          for f in *.html; do
            [[ "$f" == "index.html" || "$f" == "404.html" || "$f" == "500.html" ]] && continue
            slug="${f%.html}"
            mkdir -p "$slug"
            [[ -f "$slug/index.html" ]] || cp "$f" "$slug/index.html"
          done
          # Nieuws artikel slugs
          cd nieuws
          for f in *.html; do
            slug="${f%.html}"
            mkdir -p "$slug"
            cp "$f" "$slug/index.html"
          done

      - name: 📁 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:      ${{ secrets.FTP_HOST }}
          username:    ${{ secrets.FTP_USERNAME }}
          password:    ${{ secrets.FTP_PASSWORD }}
          protocol:    ftps
          port:        21
          local-dir:   ./out/
          server-dir:  /nightgazer.space/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: ☁️ Deploy Cloudflare Worker
        working-directory: cf-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
