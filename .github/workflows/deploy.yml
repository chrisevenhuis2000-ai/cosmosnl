name: ☁️ Deploy Cloudflare Worker
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: ☁️ Deploy Cloudflare Worker
        working-directory: cf-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
