name: 🚀 Build & Deploy naar Plesk
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Dependencies installeren
        run: npm ci

      - name: 🔨 Statische build maken
        env:
          NEXT_PUBLIC_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: npm run build

      - name: 🔧 Artikel slugs als index.html mappen
        run: |
          cd out/nieuws
          for f in *.html; do
            slug="${f%.html}"
            mkdir -p "$slug"
            cp "$f" "$slug/index.html"
          done

      - name: 📁 Deploy via rsync over SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: out/
          remote_path: /var/www/vhosts/gentlemanvillage.com/stargazing.crixium.net/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_password: ${{ secrets.SSH_PASSWORD }}
